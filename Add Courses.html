   <div class="form-title">Add a New Course</div>
    <form action="My Courses.html" method="post">
        <label for="course-name">Course Name:</label>
        <input type="text" id="course-name" name="course-name" required><br><br>

        <label for="instructor">Instructor:</label>
        <input type="text" id="instructor" name="instructor" required><br><br>

        <label for="credit-hours">Credit Hours:</label>
        <input type="number" min="1" max="5" id="credit-hours" name="credit-hours" required><br><br>

        <label for="notes">Notes:</label>
        <textarea id="notes" name="notes"></textarea><br><br>

        <input type="submit" value="Add Course">
    </form>
